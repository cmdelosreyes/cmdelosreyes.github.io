  <text x="824" y="384" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#3dbdaf" text-anchor="middle">Government</text>

  <rect x="890" y="364" width="108" height="32" rx="8" fill="#2d9f9315" stroke="#2d9f9330" stroke-width="1"/>
  <text x="944" y="384" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#3dbdaf" text-anchor="middle">Telecom</text>

  <rect x="1010" y="364" width="108" height="32" rx="8" fill="#2d9f9315" stroke="#2d9f9330" stroke-width="1"/>
  <text x="1064" y="384" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#3dbdaf" text-anchor="middle">Media</text>

