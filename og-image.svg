  <!-- Row 2 -->
  <rect x="650" y="231" width="100" height="32" rx="8" fill="#111820" stroke="#1a2332" stroke-width="1"/>
  <text x="700" y="251" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#e4e8ed" text-anchor="middle">MySQL</text>

  <rect x="764" y="231" width="100" height="32" rx="8" fill="#111820" stroke="#1a2332" stroke-width="1"/>
  <text x="814" y="251" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#e4e8ed" text-anchor="middle">Redis</text>

  <rect x="878" y="231" width="100" height="32" rx="8" fill="#111820" stroke="#1a2332" stroke-width="1"/>
  <text x="928" y="251" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#e4e8ed" text-anchor="middle">Docker</text>

