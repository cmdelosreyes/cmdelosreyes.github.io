<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0b0f14;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111820;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2d9f93;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3dbdaf;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#1a2332" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.5"/>

  <!-- Accent glow blob top-right -->
  <ellipse cx="1050" cy="120" rx="280" ry="180" fill="#2d9f93" opacity="0.06"/>

  <!-- Accent glow blob bottom-left -->
  <ellipse cx="150" cy="520" rx="220" ry="140" fill="#2d9f93" opacity="0.05"/>

  <!-- Left accent bar -->
  <rect x="80" y="120" width="4" height="390" rx="2" fill="url(#accentGrad)"/>

  <!-- Availability badge -->
  <rect x="104" y="120" width="160" height="32" rx="16" fill="#2d9f9326" stroke="#2d9f9340" stroke-width="1"/>
  <circle cx="122" cy="136" r="5" fill="#34d399" filter="url(#glow)"/>
  <text x="134" y="141" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#3dbdaf" letter-spacing="0.5">Open to Work</text>

  <!-- Name -->
  <text x="104" y="230" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="800" fill="#e4e8ed" letter-spacing="-2">Carlos Miguel</text>
  <text x="104" y="298" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="800" fill="#e4e8ed" letter-spacing="-2">Delos Reyes</text>

  <!-- Title with accent -->
  <text x="104" y="358" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="600" fill="#6b7f96" letter-spacing="-0.5">Senior Software Engineer</text>
  <rect x="104" y="374" width="320" height="3" rx="1.5" fill="url(#accentGrad)"/>

  <!-- Specialization -->
  <text x="104" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#4a90a4" letter-spacing="0.3">Laravel Specialist  ·  Performance Engineering  ·  AI-Driven Dev</text>

  <!-- Stats row -->
  <text x="104" y="490" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="800" fill="#2d9f93">~8</text>
  <text x="104" y="516" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#4d6070" letter-spacing="1.5">YEARS EXP</text>

  <text x="230" y="490" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="800" fill="#2d9f93">30+</text>
  <text x="230" y="516" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#4d6070" letter-spacing="1.5">PROJECTS</text>

  <text x="356" y="490" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="800" fill="#2d9f93">5+</text>
  <text x="356" y="516" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#4d6070" letter-spacing="1.5">INDUSTRIES</text>

