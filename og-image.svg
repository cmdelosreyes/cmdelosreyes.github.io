<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080c10"/>
      <stop offset="50%" stop-color="#0d1620"/>
      <stop offset="100%" stop-color="#091018"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2d9f93"/>
      <stop offset="100%" stop-color="#3dd6c8"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2d9f93" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#2d9f93" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="c"><rect width="1200" height="630"/></clipPath>
  </defs>

  <g clip-path="url(#c)">
    <rect width="1200" height="630" fill="url(#bg)"/>

    <!-- Center glow -->
    <ellipse cx="600" cy="340" rx="500" ry="300" fill="url(#centerGlow)"/>

    <!-- Dot grid -->
    <pattern id="d" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.7" fill="#fff" opacity="0.03"/>
    </pattern>
    <rect width="1200" height="630" fill="url(#d)"/>

    <!-- Decorative bracket lines — left -->
    <path d="M 60 140 L 40 140 L 40 490 L 60 490" fill="none" stroke="#2d9f93" stroke-width="2" opacity="0.35"/>

    <!-- Decorative bracket lines — right -->
    <path d="M 1140 140 L 1160 140 L 1160 490 L 1140 490" fill="none" stroke="#2d9f93" stroke-width="2" opacity="0.35"/>

    <!-- Scattered accent dots -->
    <circle cx="150" cy="80" r="3" fill="#2d9f93" opacity="0.25"/>
    <circle cx="1050" cy="70" r="2" fill="#3dd6c8" opacity="0.2"/>
    <circle cx="1100" cy="200" r="2.5" fill="#2d9f93" opacity="0.18"/>
    <circle cx="100" cy="550" r="2" fill="#3dd6c8" opacity="0.22"/>
    <circle cx="1080" cy="530" r="3" fill="#2d9f93" opacity="0.15"/>
    <circle cx="200" cy="300" r="1.5" fill="#3dd6c8" opacity="0.2"/>

    <!-- Code-style angle brackets — top corners -->
    <text x="90" y="60" font-family="ui-monospace,monospace" font-size="18" fill="#2d9f93" opacity="0.2">&lt;/&gt;</text>
    <text x="1090" y="580" font-family="ui-monospace,monospace" font-size="18" fill="#2d9f93" opacity="0.2">{ }</text>

    <!-- Small horizontal accent dashes -->
    <rect x="130" y="570" width="40" height="1.5" rx="0.75" fill="#2d9f93" opacity="0.15"/>
    <rect x="180" y="570" width="20" height="1.5" rx="0.75" fill="#3dd6c8" opacity="0.12"/>
    <rect x="1000" y="90" width="30" height="1.5" rx="0.75" fill="#2d9f93" opacity="0.15"/>
    <rect x="1040" y="90" width="50" height="1.5" rx="0.75" fill="#3dd6c8" opacity="0.12"/>

    <!-- Top bar -->
    <rect x="0" y="0" width="1200" height="3" fill="url(#accentGrad)" opacity="0.4"/>

    <!-- carlos.dev — centered top -->
    <text x="600" y="130" font-family="ui-monospace,'JetBrains Mono',monospace" font-size="28" font-weight="600" letter-spacing="4" fill="#2d9f93" text-anchor="middle">carlos<tspan fill="#3dd6c8">.</tspan>dev</text>

    <!-- Thin divider -->
    <rect x="420" y="155" width="360" height="1" fill="#2d9f93" opacity="0.3"/>

    <!-- Hero title — centered -->
    <text x="600" y="300" font-family="system-ui,-apple-system,'Inter',sans-serif" font-size="76" font-weight="800" fill="#e4e8ed" letter-spacing="-3" text-anchor="middle">Senior Software</text>
    <text x="600" y="385" font-family="system-ui,-apple-system,'Inter',sans-serif" font-size="76" font-weight="800" fill="#e4e8ed" letter-spacing="-3" text-anchor="middle">Engineer</text>

    <!-- Specialist — accent highlighted, centered -->
    <text x="600" y="490" font-family="system-ui,-apple-system,'Inter',sans-serif" font-size="72" font-weight="800" fill="#2d9f93" letter-spacing="-2" text-anchor="middle">Laravel Specialist</text>

    <!-- Accent underline centered -->
    <rect x="260" y="506" width="680" height="4" rx="2" fill="url(#accentGrad)" opacity="0.6"/>

    <!-- Bottom bar -->
    <rect x="0" y="617" width="1200" height="13" fill="url(#accentGrad)"/>
  </g>
</svg>
