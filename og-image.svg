  <rect x="878" y="277" width="100" height="32" rx="8" fill="#111820" stroke="#1a2332" stroke-width="1"/>
  <text x="928" y="297" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#e4e8ed" text-anchor="middle">Nginx</text>

  <rect x="992" y="277" width="130" height="32" rx="8" fill="#111820" stroke="#1a2332" stroke-width="1"/>
  <text x="1057" y="297" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#e4e8ed" text-anchor="middle">PostgreSQL</text>

